            } else if(!cs_guns.includes(gun_name)) {

        function get_crit_chance(level,user_category,mastery_level,collection_status,aug_array) {
            let critChance = 0;

            const critChanceMasteries = masteryData.filter(
                item => item.crit_chance !== undefined
            );
            const foundMastery = critChanceMasteries.find(
                item => item.category === user_category
            );
            if(foundMastery !== undefined && mastery_level >= foundMastery.crit_chance_requirement){
                critChance += foundMastery.crit_chance;
            }

            const critChanceCollections = collectionsData.filter(
                item => item.crit_chance !== undefined
            );
            const foundCollection = critChanceCollections.find(
                item => item.category === user_category
            );
            if(foundCollection !== undefined){
                if(foundCollection.name === "assault_rifle" && collection_status[2] === true){
                    critChance += 0.03;
                }
            }
            if(hcs.checked === true){
                critChance += 0.01;
            }

            if(level>0){
                const critSkill = skillsData.find(
                    item => item.name === "critical_shot"
                );
                const levelToFind = "l" + String(level) + "chance";
                critChance += critSkill[levelToFind];
            }

            if(aug_array.includes("pinpoint")){
                const index = aug_array.indexOf("pinpoint");
                critChance += (0.03+0.01*(aug_array[index+4]-1));
            }            

            if(ta.value>0){
                const targetAssist = augmentData.find(
                    item => item.name === "target_assist"
                );
                const level = ta.value;
                critChance += targetAssist[level];
            }

            if(red_perk.checked === true){
                critChance += 0.1;
            }

            return critChance;
        }

        }

        function get_rm_level(aug_array){
            if(aug_array.includes("race_modded")){
                const index = aug_array.indexOf("race_modded");
                if(aug_array[index+4] !== 0){
                    return aug_array[index+4];
                } else {
                    return -1;
                }
            } else {
                return -1;
            }
        }

        function get_fast_reload(level){
            if(level>0){
                const fastReload = skillsData.find(
                    item => item.name === "fast_reload"
                );
                const levelToFind = "l" + String(level);
                return fastReload[levelToFind];
            } else {
                return 0;
            }
        }

        function get_gloves_reload(level,gloves,rarity,collection_status){
            let bonus = 0;
            
            if(level>0){
                const nim = augmentData.find(
                    item => item.name === "nimble"
                );
                bonus += nim[level];
            }

            if(gloves !== "other_gloves"){
                const glovesAllRarities = armorData.filter(
                    item => item.name === gloves
                );
                const foundGloves = glovesAllRarities.find(
                    item => item.rarity === rarity
                );
                if(foundGloves.reload_speed !== undefined){
                    bonus += foundGloves.reload_speed;
                }
            }

            if(collection_status === true){
                bonus += 0.1;
            }

            return bonus;
        }

        function get_helmet_reload(helmet,rarity){
            if(helmet !== "other_helmet"){
                const helmetsAllRarities = armorData.filter(
                    item => item.name === helmet
                );
                const foundHelmet = helmetsAllRarities.find(
                    item => item.rarity === rarity
                );
                if(foundHelmet !== undefined && foundHelmet.reload_speed !== undefined){
                    return foundHelmet.reload_speed;
                } else {
                    return 0;
                }
            } else {
                return 0;
            }
        }

        function get_collection_reload(gun_category,collection_status){
            const reloadCollections = collectionsData.filter(
                item => item.reload_speed !== undefined
            );
            const foundCollection = reloadCollections.find(
                item => item.category === gun_category
            );
            if(foundCollection !== undefined && collection_status[foundCollection.reload_speed_requirement] === true){
                return foundCollection.reload_speed;
            } else {
                return 0;
            }
        }

        function get_mastery_reload(gun_category,mastery_level){
            if(gun_category === 4 && mastery_level >= 1){
                return 0.05;
            } else {
                return 0;
            }
        }

        function get_gloves_mastery_reload(mastery_level){
            if(mastery_level >= 3){
                return 0.1;
            } else {
                return 0;
            }
        }

        function get_clip_size(weapon,rarity,gun_category,collection_status,mastery_level,base_cores,aug_array){
            let clip_size = 0;

            const weaponsAllRarities = weaponsData.filter(
                item => item.name === weapon
            );
            if(rarity<2 && !cs_guns.includes(weapon)){
                const foundWeapon = weaponsAllRarities.find(
                    item => item.weaponVersion === Number(rarity)+1
                );
                base_clip = foundWeapon.clipSize;
                clip_size += foundWeapon.clipSize;
            } else if(!cs_guns.includes(weapon)){
                const foundWeapon = weaponsAllRarities.find(
                    item => item.weaponVersion === Number(rarity)
                );
                base_clip = foundWeapon.clipSize;
                clip_size += foundWeapon.clipSize;
            } else {
                const foundWeapon = weaponsAllRarities.find(
                    item => item.weaponVersion === Number(rarity)+1
                );
                base_clip = foundWeapon.clipSize;
                clip_size += foundWeapon.clipSize;
            }

            clip_size *= 1+0.05*base_cores;

            if(aug_array.includes("capacity")){
                const cap = augmentData.find(
                    item => item.name === "capacity"
                );
                const index = aug_array.indexOf("capacity");
                const level_index = aug_array[index+4];
                const boost = cap[level_index];
                clip_size *= 1+boost;
            }

            let conglomerate_1 = 0;

            if(gun_category === 1 && mastery_level >= 3){
                conglomerate_1 += 0.1;
            } else if(gun_category === 9 && collection_status[1] === true){
                conglomerate_1 += 0.05;
            }

            clip_size *= (1+conglomerate_1);

            let conglomerate_2 = 0;
            const clipSizeMasteries = masteryData.filter(
                item => item.clip_size_flat !== undefined
            );
            const foundMastery = clipSizeMasteries.find(
                item => item.category === gun_category
            );
            if(foundMastery !== undefined && mastery_level >= foundMastery.clip_size_flat_requirement){
                conglomerate_2 += foundMastery.clip_size_flat;
            }
            const clipSizeCollections = collectionsData.filter(
                item => item.clip_size_flat !== undefined
            );
            const foundCollection = clipSizeCollections.find(
                item => item.category === gun_category
            );
            if(foundCollection !== undefined && collection_status[foundCollection.clip_size_flat_requirement] === true){
                conglomerate_2 += foundCollection.clip_size_flat;
            }

            clip_size += conglomerate_2;

            return clip_size;
        }

        function get_boss_damage_modifier(weapon,category,mastery_level,target_is_boss){
            let multi = 1;
            if(category === 3 && mastery_level >= 3){
                multi = 1.1;
            }
            if(weapon === "Zerfallen"){
                multi = 0.5;
            }
            if(target_is_boss === true){
                return multi;
            } else {
                return 1;
            }
        }

        calculate_button.addEventListener("click",()=>{
            const user_gun = document.getElementById("gun_name");
            const user_gun_block = weaponsData.filter(
                item => item.name === user_gun.value
            );
            const user_gun_category = user_gun_block[0].category;

            const base_core_level = document.getElementById("weapon_base_cores");
            const user_helm = document.getElementById("helm");
            const user_helm_rarity = document.getElementById("helmet_rarity");
            const user_gloves = document.getElementById("gloves");
            const user_gloves_rarity = document.getElementById("gloves_rarity");
            const user_gun_collections = [standard_gun_collection.checked,red_gun_collection.checked,black_gun_collection.checked];
            const user_gun_rarity = document.getElementById("gun_rarity");

            let damage = (
                (
                    (
                        get_damage(user_gun.value,Number(user_gun_rarity.value))*(1+0.05*Number(base_core_level.value))*(1+0.1*get_deadly_level(augs))
                    )*(
                        1+get_ks_damage(Number(killing_spree.value))+get_htl_damage(Number(hold_the_line.value))+get_df_damage(Number(deadly_force.value))+get_mastery_damage(user_gun_category,gun_mastery.value)+get_collection_damage(user_gun_category,user_gun_collections)+get_smart_target_damage(Number(st.value))+get_helmet_damage(user_helm.value,user_helm_rarity.value,Number(helm_m.value))+get_gloves_damage(user_gloves.value,user_gloves_rarity.value,Number(gloves_m.value))
                    )
                )*(
                    1+get_hda_damage(ammo_mastery.value)
                )*(
                    1+get_perk_damage(red_perk.checked)
                )*(
                    get_pellet_count(user_gun.value)
                )*(
                    get_boss_damage_modifier(user_gun.value,user_gun_category,gun_mastery.value,boss_target.checked)
                )
            );

            
            let dot_damage = (
                (
                    (
                        (
                            get_dot(user_gun.value,Number(user_gun_rarity.value))*(1+0.05*Number(base_core_level.value))*(1+0.1*get_tenacious_level(augs))
                        )*(
                            1+get_ks_damage(Number(killing_spree.value))+get_htl_damage(Number(hold_the_line.value))+get_df_damage(Number(deadly_force.value))+get_mastery_damage(user_gun_category,gun_mastery.value)+get_collection_damage(user_gun_category,user_gun_collections)+get_smart_target_damage(Number(st.value))+get_helmet_damage(user_helm.value,user_helm_rarity.value,Number(helm_m.value))+get_gloves_damage(user_gloves.value,user_gloves_rarity.value,Number(gloves_m.value))
                        )
                    )*(
                        1+get_perk_damage(red_perk.checked)
                    )
                )
            );

            let dot_damage_per_tick = (
                (
                    (
                        (
                            get_dot(user_gun.value,Number(user_gun_rarity.value))*(1+0.05*Number(base_core_level.value))*(1+0.1*get_tenacious_level(augs))
                        )*(
                            1+get_ks_damage(Number(killing_spree.value))+get_htl_damage(Number(hold_the_line.value))+get_df_damage(Number(deadly_force.value))+get_mastery_damage(user_gun_category,gun_mastery.value)+get_collection_damage(user_gun_category,user_gun_collections)+get_smart_target_damage(Number(st.value))+get_helmet_damage(user_helm.value,user_helm_rarity.value,Number(helm_m.value))+get_gloves_damage(user_gloves.value,user_gloves_rarity.value,Number(gloves_m.value))
                        )
                    )*(
                        1+get_perk_damage(red_perk.checked)
                    )
                )/(
                    get_dot_duration(user_gun.value,Number(user_gun_rarity.value))
                )
            );


            let crit_damage = damage*(1+get_crit_damage(critical_shot.value,user_gun_category,gun_mastery.value,user_gun_collections));
            let average_damage = damage*(1+(get_crit_damage(critical_shot.value,user_gun_category,gun_mastery.value,user_gun_collections)*get_crit_chance(critical_shot.value,user_gun_category,gun_mastery.value,user_gun_collections,augs)));

            let super_crit_damage = "N/A";
            if(user_gun_category === 5 && gun_mastery.value === "5"){
                super_crit_damage = damage*10;
                average_damage = (
                    damage*(
                        1+get_crit_chance(critical_shot.value,user_gun_category,gun_mastery.value,user_gun_collections,augs)*(0.95*get_crit_damage(critical_shot.value,user_gun_category,gun_mastery.value,user_gun_collections)+0.45)
                    )
                )
            }
            if(!isNaN(super_crit_damage)){
                super_crit_damage = super_crit_damage.toLocaleString(undefined, {maximumFractionDigits: 2});
            }

            let rps = (
                (
                    get_rps(user_gun.value,Number(user_gun_rarity.value))*(1+0.05*Number(base_core_level.value))*(1+0.1*get_overclocked_level(augs))
                )/(
                    1-(get_adrenaline_boost(adrenaline.value)+(get_mastery_rps(user_gun_category,gun_mastery.value)+get_collection_rps(user_gun_category,user_gun_collections)))
                )
            );
            
            

            let reload_time = (
                (
                    (
                        get_reload(user_gun.value,user_gun_rarity.value)*(1-(0.08+0.04*(get_rm_level(augs)-1)))*(1-get_fast_reload(fast_reload.value))*(1-get_gloves_reload(nimble.value,user_gloves.value,gloves_rarity.value,gcr.checked))*(1-get_helmet_reload(user_helm.value,helmet_rarity.value))
                    )-(
                        get_reload(user_gun.value,user_gun_rarity.value)*(get_collection_reload(user_gun_category,user_gun_collections)+get_mastery_reload(user_gun_category,gun_mastery.value)+get_gloves_mastery_reload(gloves_m.value))
                    )
                )*(
                    1-(get_adrenaline_boost(adrenaline.value))
                )
            );
            if(reload_time < get_reload(user_gun.value,user_gun_rarity.value)*0.2){
                reload_time = get_reload(user_gun.value,user_gun_rarity.value)*0.2;
            }

            let pure_dps = (
                (average_damage+dot_damage)*rps
            );

            let uptime = (
                (
                    (get_clip_size(user_gun.value,Number(user_gun_rarity.value),user_gun_category,user_gun_collections,gun_mastery.value,base_core_level.value,augs)-1)/rps
                )/(
                    ((get_clip_size(user_gun.value,Number(user_gun_rarity.value),user_gun_category,user_gun_collections,gun_mastery.value,base_core_level.value,augs)-1)/rps)+reload_time
                )
            );

            let average_dps_no_cooldowns = (
                pure_dps*uptime
            );

            
            results.innerHTML =
                `<table class="table table-bordered monospaced-text">
                    <tbody>
                        <tr>
                            <th style="width: 50%;">Gun:</th> 
                            <th style="width: 50%;">${user_gun.value}</th>
                        </tr>
                        <tr>
                            <td>Pure DPS:</td>
                            <td>${pure_dps.toLocaleString(undefined, {maximumFractionDigits: 2})}</td>
                        </tr>
                        <tr>
                            <td><span class="additional-information" title="Average DPS not including ability cooldowns.">Average DPS</span>:</td>
                            <td>${average_dps_no_cooldowns.toLocaleString(undefined, {maximumFractionDigits: 2})}</td>
                        </tr>
                        <tr>
                            
                            <td><span class="additional-information" title="Damage per shot with all buffs except crit.">Base Damage</span>:</td>
                            <td>${damage.toLocaleString(undefined, {maximumFractionDigits: 2})}</td>
                            
                        </tr>
                        <tr>
                            <td>Crit Damage: </td>
                            <td>${crit_damage.toLocaleString(undefined, {maximumFractionDigits: 2})}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>Super Crit Damage: </td>
                            <td>${super_crit_damage}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td><span class="additional-information" title="Expected value damage after factoring in crit.">Average Damage</span>: </td>
                            <td>${average_damage.toLocaleString(undefined, {maximumFractionDigits: 2})}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>Crit Chance: </td>
                            <td>${(get_crit_chance(critical_shot.value,user_gun_category,gun_mastery.value,user_gun_collections,augs)*100).toLocaleString(undefined, {maximumFractionDigits: 2})}%<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>DoT: </td>
                            <td>${dot_damage.toLocaleString(undefined, {maximumFractionDigits: 2})}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>DoT Per Tick: </td>
                            <td>${dot_damage_per_tick.toLocaleString(undefined, {maximumFractionDigits: 2})}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>RPS: </td>
                            <td>${rps.toLocaleString(undefined, {maximumFractionDigits: 2})}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>Base Reload: </td>
                            <td>${get_reload(user_gun.value,user_gun_rarity.value).toLocaleString(undefined, {maximumFractionDigits: 2})}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>Reload Time: </td>
                            <td>${reload_time.toLocaleString(undefined, {maximumFractionDigits: 2})}<br></td>
                        </tr>
                        <tr>
                            
                            
                            <td>Capacity:</td>
                            <td>${get_clip_size(user_gun.value,Number(user_gun_rarity.value),user_gun_category,user_gun_collections,gun_mastery.value,base_core_level.value,augs).toLocaleString(undefined, {maximumFractionDigits: 2})}</td>
                        </tr>
                        <tr>
                            
                            
                            <td>Uptime:</td>
                            <td>${(uptime*100).toLocaleString(undefined, {maximumFractionDigits: 2})}%</td>
                        </tr>
                    </tbody>
                </table>
                `;

            /*
                category ${user_gun_category}<br>
                Base Damage: ${get_damage(user_gun.value,Number(user_gun_rarity.value))}<br>
                base core ${0.05*Number(base_core_level.value)}<br>
                deadly ${0.1*get_deadly_level(augs)}<br>
                ks ${get_ks_damage(Number(killing_spree.value))}<br>
                htl ${get_htl_damage(Number(hold_the_line.value))}<br>
                df ${get_df_damage(Number(deadly_force.value))}<br>
                mastery ${get_mastery_damage(user_gun_category,gun_mastery.value)}<br>
                collection ${get_collection_damage(user_gun_category,user_gun_collections)}<br>
                st ${get_smart_target_damage(Number(st.value))}<br>
                
                <p>
                        ${(1-(0.08+0.04*(get_rm_level(augs)-1)))}<br>
                        ${(1-get_fast_reload(fast_reload.value))}<br>
                        ${1-get_gloves_reload(nimble.value,user_gloves.value,gloves_rarity.value,gcr.checked)}<br>
                        ${(1-get_helmet_reload(user_helm.value,helmet_rarity.value))}<br>
                        ${get_collection_reload(user_gun_category,user_gun_collections)}<br>
                        ${get_mastery_reload(user_gun_category,gun_mastery.value)}<br>
                        ${get_gloves_mastery_reload(gloves_m.value)}<br>
                        ${(get_adrenaline_boost(adrenaline.value))}<br>
                    </p>

            results.innerHTML =
                `Pure DPS: ${pure_dps}<br>
                Average DPS: ${avg_dps}<br>
                Time To Kill (WIP): ${ttk}<br><br>
                Max Damage Per Hit: ${max_dph}<br>
                Average Damage Per Hit: ${avg_dph}<br>
                `
            if(gamemode.value="apocalypse"){
                results.innerHTML += 
                    `One Shots ${target} Until Wave (WIP): ${one_shot_wave}<br>`
            }
            results.innerHTML +=
                `<br>Pierce: ${pierce}<br>
                Movement Penalty: ${movement_pen}<br>`
            */

        });
    </script>
